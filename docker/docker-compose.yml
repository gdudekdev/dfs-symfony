name: dfs-symfony
services:
  # ─── PHP-FPM pour Symfony ──────────────────────────────────────
  php_symfony:
    image: php:8.4-fpm
    container_name: php_symfony
    volumes:
      - ../src:/app
    working_dir: /app
    environment:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    # Extensions PHP + Composer + Symfony CLI
    command: >
      sh -c "
        apt-get update && apt-get install -y git unzip libzip-dev &&
        docker-php-ext-install pdo pdo_mysql zip &&
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
        curl -sS https://get.symfony.com/cli/installer | bash &&
        mv /root/.symfony5/bin/symfony /usr/local/bin/symfony &&
        php-fpm
      "

  # ─── Nginx pour Symfony ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_symfony
    ports:
      - "8001:80"          # Symfony accessible sur http://localhost:8001
    volumes:
      - ../src:/app          # Code source
      - ../nginx/symfony.conf:/etc/nginx/conf.d/default.conf  # Config Nginx
    depends_on:
      - php_symfony

  # ─── Base de données MySQL ─────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mysql_8
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: demo
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  # ─── phpMyAdmin ────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8080:80"

volumes:
  db_data:

